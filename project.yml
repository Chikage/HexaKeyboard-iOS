name: HexaKeyboard

options:
  bundleIdPrefix: icu.ringona
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  minimumXcodeGenVersion: 2.44.1

settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    SWIFT_VERSION: "6.0"

targets:
  HexaKeyboard:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
        excludes:
          - Assets.xcassets
          - Resources
      - path: App/Assets.xcassets
        group: App
        buildPhase: resources
      - path: App/Resources
        group: App
        buildPhase: resources
    dependencies:
      - target: HexaKeyboardCore
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Hexa Key"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        MARKETING_VERSION: 1.0.0
        PRODUCT_BUNDLE_IDENTIFIER: icu.ringona.hexakeyboard
        PRODUCT_NAME: HexaKeyboard
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      gatherCoverageData: true
      testTargets:
        - HexaKeyboardTests

  HexaKeyboardCore:
    type: framework
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/HexaKeyboardCore
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: icu.ringona.hexakeyboard.core
        PRODUCT_NAME: HexaKeyboardCore
        SKIP_INSTALL: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"

  HexaKeyboardTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    dependencies:
      - target: HexaKeyboardCore
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: icu.ringona.hexakeyboard.tests
        PRODUCT_NAME: HexaKeyboardTests
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1,2"
